version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sharing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: sharing_station
      TZ: Asia/Shanghai
    ports:
      - "4022:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sharing-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASS=123456
      - DB_NAME=sharing_station
      - JWT_SECRET=sharing-station-secret-key
      - JWT_EXPIRES_IN=24h
      - BASE_URL=http://localhost:6022
      - PORT=6022
    ports:
      - "6022:6022"
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    links:
      - mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sharing-frontend
    restart: unless-stopped
    ports:
      - "2022:2022"
    depends_on:
      - backend
    links:
      - backend

volumes:
  mysql-data:
  backend-uploads:
